AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation stack to launch an EC2 instance

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: SSM parameter for the latest Amazon Linux 2023 AMI

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to launch the instance in

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet to launch the instance in

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0   # Restrict this to your IP in production
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-instance'

Outputs:
  InstanceId:
    Description: Instance ID
    Value: !Ref EC2Instance

  PrivateIp:
    Description: Private IP address
    Value: !GetAtt EC2Instance.PrivateIp

  PublicIp:
    Description: Public IP address (if subnet assigns one)
    Value: !GetAtt EC2Instance.PublicIp
